<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mood Selection Overlay - 万万没想到</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#FF6B6B",
            "accent-orange": "#FF9F43",
            "accent-blue": "#48DBFB",
            "accent-green": "#1DD1A1",
            "background-light": "#f8f5f5",
            "background-dark": "#221010",
            "text-main": "#2D3436",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "1rem", 
            "lg": "2rem", 
            "xl": "3rem", 
            "full": "9999px"
          },
          boxShadow: {
            'glass': '0 12px 32px 0 rgba(31, 38, 135, 0.07)',
            'badge-primary': '0 10px 20px rgba(255, 107, 107, 0.4)',
            'badge-orange': '0 10px 20px rgba(255, 159, 67, 0.4)',
            'badge-blue': '0 10px 20px rgba(72, 219, 251, 0.4)',
            'badge-green': '0 10px 20px rgba(29, 209, 161, 0.4)',
          },
          backgroundImage: {
            'gradient-pastel': 'linear-gradient(135deg, #FFEBF0 0%, #E0F7FA 50%, #F5F7FA 100%)',
          }
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.8);
      border-left: 1px solid rgba(255, 255, 255, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      border-right: 1px solid rgba(255, 255, 255, 0.3);
    }

    .modal-backdrop {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    
    .badge-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .badge-hover:hover {
      transform: translateY(-10px);
    }
    
    .badge-hover:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body class="bg-gradient-pastel min-h-screen w-full relative overflow-hidden flex items-center justify-center">
<!-- Background decorative elements to enhance the glassmorphism effect -->
<div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-primary opacity-10 blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-accent-blue opacity-10 blur-[120px] pointer-events-none"></div>
<!-- Modal Backdrop -->
<div class="absolute inset-0 modal-backdrop z-10 flex items-center justify-center p-4">
<!-- Central Glass Card -->
<div class="glass-panel w-full max-w-[600px] h-[400px] rounded-xl shadow-glass flex flex-col items-center justify-center relative z-20 overflow-hidden group">
<!-- Subtle internal reflection -->
<div class="absolute inset-0 bg-gradient-to-br from-white/40 to-transparent opacity-50 pointer-events-none rounded-xl"></div>
<!-- Prompt Text -->
<h2 class="text-text-main text-[32px] md:text-[40px] font-bold tracking-tight mb-16 relative z-30 drop-shadow-sm">
        此刻心情如何？
      </h2>
<!-- Mood Badges Container -->
<div class="flex flex-wrap justify-center gap-6 md:gap-8 relative z-30 px-4">
<!-- Coral / Passionate -->
<button class="badge-hover w-[80px] h-[80px] rounded-full bg-primary shadow-badge-primary flex items-center justify-center group/btn focus:outline-none focus:ring-4 focus:ring-primary/30">
<span class="material-symbols-outlined text-white text-[36px]" style="font-variation-settings: 'FILL' 1;">
            favorite
          </span>
</button>
<!-- Orange / Energetic -->
<button class="badge-hover w-[80px] h-[80px] rounded-full bg-accent-orange shadow-badge-orange flex items-center justify-center group/btn focus:outline-none focus:ring-4 focus:ring-accent-orange/30">
<span class="material-symbols-outlined text-white text-[36px]" style="font-variation-settings: 'FILL' 1;">
            local_fire_department
          </span>
</button>
<!-- Blue / Calm -->
<button class="badge-hover w-[80px] h-[80px] rounded-full bg-accent-blue shadow-badge-blue flex items-center justify-center group/btn focus:outline-none focus:ring-4 focus:ring-accent-blue/30">
<span class="material-symbols-outlined text-white text-[36px]" style="font-variation-settings: 'FILL' 1;">
            water_drop
          </span>
</button>
<!-- Green / Fresh -->
<button class="badge-hover w-[80px] h-[80px] rounded-full bg-accent-green shadow-badge-green flex items-center justify-center group/btn focus:outline-none focus:ring-4 focus:ring-accent-green/30">
<span class="material-symbols-outlined text-white text-[36px]" style="font-variation-settings: 'FILL' 1;">
            eco
          </span>
</button>
</div>
<!-- Close button (optional, often needed for modals) -->
<button class="absolute top-6 right-6 text-text-main/40 hover:text-text-main transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[24px]">
          close
        </span>
</button>
</div>
</div>
</body></html>
