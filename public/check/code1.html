<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>万万没想到 - 今日打卡</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#f53d3d",
          "background-light": "#f8f5f5",
          "background-dark": "#221010",
          "text-main": "#2D3436",
          "text-muted": "#636E72",
          "glass-base": "rgba(255, 255, 255, 0.45)",
          "glass-border-light": "rgba(255, 255, 255, 0.6)",
          "glass-border-dark": "rgba(255, 255, 255, 0.2)",
        },
        fontFamily: {
          "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"],
          "body": ["Noto Sans SC", "sans-serif"]
        },
        borderRadius: {
          "DEFAULT": "1rem", 
          "lg": "2rem", 
          "xl": "3rem", 
          "full": "9999px"
        },
        backgroundImage: {
          'pastel-gradient': 'linear-gradient(135deg, #FFEBF0 0%, #E0F7FA 50%, #F5F7FA 100%)',
        },
        boxShadow: {
          'glass': '0 12px 32px 0 rgba(31, 38, 135, 0.07)',
          'glass-inner': 'inset 0 2px 4px 0 rgba(255, 255, 255, 0.3)',
          'glass-hover': '0 20px 40px 0 rgba(31, 38, 135, 0.1), inset 0 4px 8px 0 rgba(255, 255, 255, 0.5)',
        },
        animation: {
          'breathe': 'breathe 4s ease-in-out infinite',
        },
        keyframes: {
          breathe: {
            '0%, 100%': { transform: 'scale(1) translateY(0)' },
            '50%': { transform: 'scale(1.02) translateY(-4px)' },
          }
        }
      },
    },
  }
</script>
<style>
  .glass-panel {
    background: var(--tw-colors-glass-base);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--tw-colors-glass-border-light);
    border-left: 1px solid var(--tw-colors-glass-border-light);
    border-bottom: 1px solid var(--tw-colors-glass-border-dark);
    border-right: 1px solid var(--tw-colors-glass-border-dark);
  }
  
  .glass-button {
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    transform-style: preserve-3d;
  }
  
  .glass-button:hover {
    transform: scale(1.05) translateZ(10px) rotateX(2deg) rotateY(2deg);
  }
  
  .glass-button:active {
    transform: scale(0.95);
  }
</style>
</head>
<body class="font-display text-text-main bg-pastel-gradient min-h-screen w-full overflow-hidden selection:bg-primary selection:text-white">
<div class="relative flex min-h-screen w-full flex-col p-6 md:p-12">
<!-- Header Section -->
<header class="flex w-full items-start justify-between z-10">
<!-- Date -->
<div class="glass-panel rounded-full px-6 py-3 shadow-glass">
<p class="text-text-muted text-sm md:text-base font-medium tracking-wide">
          2023年10月24日 · 星期二
        </p>
</div>
<!-- Streak Counter -->
<div class="glass-panel rounded-full px-5 py-3 shadow-glass flex items-center gap-2">
<span class="text-primary text-lg">🔥</span>
<p class="text-text-main text-sm font-bold tracking-wide">
          连续 12 天
        </p>
</div>
</header>
<!-- Main Hero Section -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-4xl mx-auto z-10 relative">
<!-- Teaser Title -->
<h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-text-main mb-16 text-center tracking-tight drop-shadow-sm">
        今日份的<span class="text-primary opacity-90">万万没想到...</span>
</h1>
<!-- Primary CTA Button -->
<button class="glass-button glass-panel shadow-glass shadow-glass-inner hover:shadow-glass-hover rounded-full w-[240px] h-[88px] flex items-center justify-center group relative overflow-hidden cursor-pointer animate-breathe focus:outline-none focus:ring-4 focus:ring-primary/30">
<!-- Shine effect on hover -->
<div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/40 to-transparent group-hover:animate-[shimmer_1.5s_infinite] skew-x-12"></div>
<span class="text-primary font-bold text-2xl tracking-widest relative z-10 flex items-center gap-2">
          立即揭晓
          <span class="material-symbols-outlined text-3xl group-hover:translate-x-1 transition-transform duration-300" style="font-variation-settings: 'FILL' 1;">
            auto_awesome
          </span>
</span>
</button>
<!-- Subtle helper text -->
<p class="mt-8 text-text-muted/60 text-sm font-medium tracking-widest uppercase">
        Click to check in
      </p>
</main>
<!-- Decorative background blobs (pure CSS) -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-gradient-to-br from-[#FF6B6B]/20 to-[#FF9F43]/20 blur-[100px] -z-10 pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-gradient-to-tl from-[#48DBFB]/20 to-[#1DD1A1]/20 blur-[120px] -z-10 pointer-events-none"></div>
</div>
</body></html>
